<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NexGen V6.0 | Sistema Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap">
    <style>
        body { background: #010409; color: #8b949e; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(13, 17, 23, 0.8); border: 1px solid #30363d; backdrop-filter: blur(10px); }
        #hmi-layout { 
            position: relative; width: 100%; height: 550px; 
            background: #0d1117; border-radius: 24px; border: 1px solid #30363d;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }
        .station-label {
            position: absolute; height: 140px; top: 35%; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.1;
        }
        /* Estilo para los dropdowns de administración */
        .dropdown:hover .dropdown-menu { display: block; }
    </style>
</head>
<body class="p-6">

    <div id="login-overlay"></div> 

    <nav class="flex items-center justify-between mb-6 glass p-4 rounded-2xl border-b-2 border-blue-500/30">
        <div class="flex items-center gap-6">
            <span class="text-white font-black italic text-xl tracking-tighter">NEXGEN <span class="text-blue-500">V6.0</span></span>
            
            <div class="flex gap-2 border-l border-white/10 pl-6 items-center">
                <button onclick="console.log('Panel Monitoreo')" class="px-3 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 text-gray-300 text-[10px] font-bold transition-all uppercase tracking-widest">
                    📊 Panel
                </button>

                <button onclick="MaintWidget.mostrarBitacora()" class="px-3 py-1.5 rounded-lg bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 text-[10px] font-bold transition-all border border-blue-500/20 uppercase tracking-widest">
                    📋 Bitácora (H)
                </button>

                <div class="relative dropdown">
                    <button class="px-3 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 text-gray-300 text-[10px] font-bold transition-all uppercase tracking-widest flex items-center gap-1">
                        ⚙️ Admin ▼
                    </button>
                    <div class="dropdown-menu hidden absolute left-0 mt-2 w-40 glass rounded-xl shadow-2xl z-[500] border border-white/10 overflow-hidden">
                        <button onclick="AdminWidget.mostrarUsuarios()" class="w-full text-left px-4 py-2 text-[9px] hover:bg-blue-500 hover:text-white transition-colors uppercase font-bold text-gray-400 border-b border-white/5">Usuarios</button>
                        
                        <button onclick="console.log('Admin Roles')" class="w-full text-left px-4 py-2 text-[9px] hover:bg-blue-500 hover:text-white transition-colors uppercase font-bold text-gray-400 border-b border-white/5">Roles</button>
                        <button onclick="console.log('Admin Grupos')" class="w-full text-left px-4 py-2 text-[9px] hover:bg-blue-500 hover:text-white transition-colors uppercase font-bold text-gray-400 border-b border-white/5">Grupos</button>
                        <button onclick="console.log('Admin Sensores')" class="w-full text-left px-4 py-2 text-[9px] hover:bg-blue-500 hover:text-white transition-colors uppercase font-bold text-gray-400">Sensores</button>
                    </div>
                </div>

                <button onclick="console.log('Generar Reportes')" class="px-3 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 text-gray-300 text-[10px] font-bold transition-all uppercase tracking-widest">
                    📑 Reportes
                </button>

                <div class="w-[1px] h-4 bg-white/10 mx-2"></div>

                <button onclick="HMIWidget.start()" class="p-1.5 rounded-lg bg-white/5 hover:bg-white/10 text-gray-500 hover:text-white transition-all">
                    🔄
                </button>
            </div>
        </div>

        <div class="text-right">
            <p id="user-display" class="text-[10px] font-black text-blue-500 uppercase tracking-widest"></p>
            <p class="text-[8px] text-gray-500 font-bold uppercase tracking-tighter italic">V6.0 Stable Base</p>
        </div>
    </nav>

    <div id="hmi-layout" class="group">
        <div class="station-label bg-blue-500 w-[20%]" style="left: 5%;">Inicio</div>
        <div class="station-label bg-green-500 w-[35%]" style="left: 28%;">Proceso</div>
        <div class="station-label bg-yellow-500 w-[20%]" style="left: 66%;">Calidad</div>
        <div class="station-label bg-red-500 w-[8%]" style="left: 88%;">Fin</div>
        
        <div id="nodes-layer"></div>
    </div>

    <script src="{{ url_for('static', filename='js/admin_widget.js') }}"></script>
    <script src="{{ url_for('static', filename='js/maint_widget.js') }}"></script>
    <script src="{{ url_for('static', filename='js/hmi_widget.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth_widget.js') }}"></script>

<div id="panel-config-sensores" class="admin-section" style="padding: 20px; background: #f4f7f6; border-radius: 8px;">
    <h3><i class="fas fa-microchip"></i> Gestión de Hardware Dinámico</h3>
    
    <div class="form-group" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px;">
        <input type="text" id="sensor-nombre" placeholder="Nombre (ej: Tanque Principal)" class="form-control">
        <input type="text" id="sensor-id-conn" placeholder="ID Conexión (ej: COM3 o IP)" class="form-control">
        <select id="sensor-metrica" class="form-control">
            <option value="Temperatura">Temperatura</option>
            <option value="Presión">Presión</option>
            <option value="Caudal">Caudal</option>
            <option value="Nivel">Nivel</option>
            <option value="Voltaje">Voltaje</option>
        </select>
        <input type="text" id="sensor-unidad" placeholder="Unidad (ej: °C, Bar, L/min)" class="form-control">
        <button onclick="guardarSensor()" class="btn btn-primary" style="background: #28a745; color: white; border: none; cursor: pointer;">
            + Registrar Sensor
        </button>
    </div>

    <div class="flex items-center gap-3">
    <span class="text-white font-black italic text-xl tracking-tighter">NEXGEN <span class="text-blue-500">V6.0</span></span>
    <div id="plc-status-led" class="flex items-center gap-2 px-2 py-1 rounded-full bg-white/5 border border-white/10">
        <div id="led-circle" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></div>
        <span id="led-text" class="text-[8px] font-bold text-gray-400 uppercase">SIMULACIÓN</span>
    </div>
</div>

    <table class="table" style="width: 100%; border-collapse: collapse; background: white;">
        <thead>
            <tr style="background: #333; color: white;">
                <th>Nombre</th>
                <th>ID Conexión</th>
                <th>Métrica</th>
                <th>Unidad</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="tabla-sensores-body">
            </tbody>
    </table>
</div>

</body>
</html>
