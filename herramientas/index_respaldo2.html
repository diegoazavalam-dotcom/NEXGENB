<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NexGen V6.0 | Base Estable 6.3</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body { background: #010409; color: #8b949e; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(13, 17, 23, 0.8); border: 1px solid #30363d; backdrop-filter: blur(10px); }
        #hmi-layout { 
            position: relative; width: 100%; height: 500px; 
            background: #0d1117; border-radius: 24px; border: 1px solid #30363d;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            margin-bottom: 24px;
        }
        .station-label {
            position: absolute; height: 140px; top: 35%; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.1;
        }
        .dropdown:hover .dropdown-menu { display: block; }
        
        /* Inputs estilo dark industrial */
        .form-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            outline: none;
        }
        .form-input:focus { border-color: #3b82f6; }
    </style>

    <script src="{{ url_for('static', filename='js/config_widget.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/map_widget.js') }}" defer></script>
</head>
<body class="p-6">

    <div id="login-overlay"></div> 

    <nav class="flex items-center justify-between mb-6 glass p-4 rounded-2xl border-b-2 border-blue-500/30">
        <div class="flex items-center gap-6">
            <div class="flex flex-col">
                <span class="text-white font-black italic text-xl tracking-tighter leading-none">NEXGEN <span class="text-blue-500">V6.0</span></span>
                <div id="plc-status-led" class="flex items-center gap-1.5 mt-1">
                    <div id="led-circle" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></div>
                    <span id="led-text" class="text-[7px] font-bold text-gray-500 uppercase tracking-widest">Sincronizando...</span>
                </div>
            </div>
            
            <div class="flex gap-2 border-l border-white/10 pl-6 items-center">
                <button class="px-3 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 text-gray-300 text-[10px] font-bold uppercase">📊 Panel</button>
                <button onclick="MaintWidget.mostrarBitacora()" class="px-3 py-1.5 rounded-lg bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 text-[10px] font-bold border border-blue-500/20 uppercase">📋 Bitácora</button>

                <div class="relative dropdown">
                    <button class="px-3 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 text-gray-300 text-[10px] font-bold uppercase flex items-center gap-1">⚙️ Admin ▼</button>
                    <div class="dropdown-menu hidden absolute left-0 mt-2 w-40 glass rounded-xl shadow-2xl z-[500] border border-white/10 overflow-hidden">
                        <button onclick="AdminWidget.mostrarUsuarios()" class="w-full text-left px-4 py-2 text-[9px] hover:bg-blue-500 hover:text-white text-gray-400 uppercase font-bold border-b border-white/5">Usuarios</button>
                        <button class="w-full text-left px-4 py-2 text-[9px] hover:bg-blue-500 hover:text-white text-gray-400 uppercase font-bold">Sensores</button>
                    </div>
                </div>
                <button class="px-3 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 text-gray-300 text-[10px] font-bold uppercase">📑 Reportes</button>
            </div>
        </div>

        <div class="text-right">
            <p id="user-display" class="text-[10px] font-black text-blue-500 uppercase tracking-widest"></p>
            <p class="text-[8px] text-gray-500 font-bold uppercase italic">Base Estable 6.2</p>
        </div>
    </nav>

    <div id="hmi-layout" class="group">
        <div class="station-label bg-blue-500 w-[20%]" style="left: 5%;">Inicio</div>
        <div class="station-label bg-green-500 w-[35%]" style="left: 28%;">Proceso</div>
        <div class="station-label bg-yellow-500 w-[20%]" style="left: 66%;">Calidad</div>
        <div class="station-label bg-red-500 w-[8%]" style="left: 88%;">Fin</div>
        <div id="nodes-layer"></div>
    </div>

    <div class="glass p-6 rounded-3xl border-t-2 border-green-500/30">
        <div class="flex items-center gap-2 mb-4">
            <div class="w-2 h-4 bg-green-500 rounded-full"></div>
            <h3 class="text-white font-black text-xs uppercase tracking-widest">Gestión de Hardware Dinámico</h3>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
            <input type="text" id="sensor-nombre" placeholder="Nombre (Tanque A)" class="form-input">
            <input type="text" id="sensor-id-conn" placeholder="Dirección PLC (DB1.DBW0)" class="form-input">
            <select id="sensor-metrica" class="form-input">
                <option value="Temperatura">Temperatura</option>
                <option value="Presión">Presión</option>
                <option value="Nivel">Nivel</option>
                <option value="Caudal">Caudal</option>
            </select>
            <input type="text" id="sensor-unidad" placeholder="Unidad (°C)" class="form-input">
            <button onclick="ConfigWidget.registrar()" class="bg-green-600 hover:bg-green-500 text-white text-[10px] font-black py-2 rounded-lg transition-all active:scale-95 uppercase">
                + Vincular Sensor
            </button>
        </div>

        <div class="overflow-hidden rounded-xl border border-white/5">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-white/5 text-[9px] text-gray-500 uppercase font-black">
                        <th class="p-3">Dispositivo</th>
                        <th class="p-3">Mapping PLC</th>
                        <th class="p-3">Tipo</th>
                        <th class="p-3">Unidad</th>
                        <th class="p-3">Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-sensores-body" class="divide-y divide-white/5">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/admin_widget.js') }}"></script>
    <script src="{{ url_for('static', filename='js/maint_widget.js') }}"></script>
    <script src="{{ url_for('static', filename='js/hmi_widget.js') }}"></script>
<script src="{{ url_for('static', filename='js/auth_widget.js') }}"></script>
<script src="{{ url_for('static', filename='js/config_widget.js') }}"></script>

<script>
    // Esto asegura que los widgets se inicien solo cuando el DOM esté listo
    window.onload = () => {
        if (typeof AuthWidget !== 'undefined') AuthWidget.init();
    };
</script>
</body>
</html>
