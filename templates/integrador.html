<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexgen Core - God Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div id="login-modal" class="bg-gray-800 p-8 rounded-lg shadow-2xl w-full max-w-md border border-gray-700">
        <h2 class="text-2xl font-bold mb-4 text-blue-400">🛡️ Acceso Integrador</h2>
        <input type="password" id="token-input" placeholder="Token Maestro" class="w-full bg-gray-900 border border-gray-600 rounded p-2 mb-4 text-white focus:outline-none focus:border-blue-500">
        <button onclick="autenticar()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">Entrar al Core</button>
    </div>

    <div id="admin-panel" class="hidden w-full max-w-4xl bg-gray-800 rounded-lg shadow-2xl border border-gray-700 p-6">
        <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-4">
            <h1 class="text-3xl font-bold text-blue-400">⚙️ Configuración Maestra del Sistema</h1>
            <button onclick="guardarConfig()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded transition">💾 Guardar y Aplicar en Caliente</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-gray-900 p-4 rounded border border-gray-700">
                <h3 class="text-xl font-bold text-gray-300 mb-4 border-b border-gray-700 pb-2">Hardware PLC (Siemens)</h3>
                <label class="block text-sm text-gray-400 mb-1">Dirección IP</label>
                <input type="text" id="plc-ip" class="w-full bg-gray-800 border border-gray-600 rounded p-2 mb-4 text-white">
                
                <div class="flex gap-4 mb-4">
                    <div class="w-1/2">
                        <label class="block text-sm text-gray-400 mb-1">Rack</label>
                        <input type="number" id="plc-rack" class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-white">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-sm text-gray-400 mb-1">Slot</label>
                        <input type="number" id="plc-slot" class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-white">
                    </div>
                </div>
                
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" id="plc-simulacion" class="w-5 h-5 accent-blue-500">
                    <span class="text-gray-300">Activar Modo Simulación (Sin PLC físico)</span>
                </label>
            </div>

            <div class="bg-gray-900 p-4 rounded border border-gray-700">
                <h3 class="text-xl font-bold text-gray-300 mb-4 border-b border-gray-700 pb-2">Base de Datos & Motor</h3>
                
                <label class="block text-sm text-gray-400 mb-1">Retención Datos Principales (Días)</label>
                <input type="number" id="db-principal" class="w-full bg-gray-800 border border-gray-600 rounded p-2 mb-4 text-white">
                
                <label class="block text-sm text-gray-400 mb-1">Retención Archivo Histórico (Días)</label>
                <input type="number" id="db-archivo" class="w-full bg-gray-800 border border-gray-600 rounded p-2 mb-4 text-white">

                <label class="block text-sm text-gray-400 mb-1">Velocidad de Polling (ms)</label>
                <input type="number" id="sys-polling" class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-white" title="Recomendado: 1000ms a 2000ms">
            </div>

            <!-- NUEVO PANEL: AGENTE ZOLE -->
            <div class="bg-gray-900 p-4 rounded border border-gray-700 col-span-1 md:col-span-2">
                <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                    <h3 class="text-xl font-bold text-gray-300">🕵️‍♂️ Agente ZoLe (Diagnóstico de Hardware OS)</h3>
                    <a href="/api/godmode/download_agent" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold py-1 px-4 rounded transition">📥 Descargar Agente Python</a>
                </div>
                
                <div class="flex gap-4 items-end">
                    <div class="w-1/3">
                        <label class="block text-sm text-gray-400 mb-1">IP del Servidor Linux (VM)</label>
                        <input type="text" id="zole-ip" placeholder="Ej: 192.168.1.50" class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-white">
                    </div>
                    <div class="w-1/3">
                        <label class="block text-sm text-gray-400 mb-1">Puerto SNMP</label>
                        <input type="number" id="zole-port" value="161" class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-white">
                    </div>
                    <div class="w-1/3">
                        <button onclick="guardarAgenteZoLe()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded transition">Guardar Configuración TI</button>
                    </div>
                </div>

                <!-- Configuración de Límites y Telegram TI -->
                <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-6 border-t border-gray-700 pt-4">
                    <div>
                        <h4 class="text-sm font-bold text-gray-400 mb-2 uppercase tracking-wide">Límites de Alerta (%)</h4>
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <div><label class="text-gray-500">CPU Alto</label><input type="number" id="zole-cpu-h" class="w-full bg-gray-800 border border-gray-600 rounded p-1 text-white"></div>
                            <div><label class="text-gray-500">CPU Bajo</label><input type="number" id="zole-cpu-l" class="w-full bg-gray-800 border border-gray-600 rounded p-1 text-white"></div>
                            
                            <div><label class="text-gray-500">RAM Alto</label><input type="number" id="zole-ram-h" class="w-full bg-gray-800 border border-gray-600 rounded p-1 text-white"></div>
                            <div><label class="text-gray-500">RAM Bajo</label><input type="number" id="zole-ram-l" class="w-full bg-gray-800 border border-gray-600 rounded p-1 text-white"></div>
                            
                            <div><label class="text-gray-500">Disco Alto</label><input type="number" id="zole-disk-h" class="w-full bg-gray-800 border border-gray-600 rounded p-1 text-white"></div>
                            <div><label class="text-gray-500">Disco Bajo</label><input type="number" id="zole-disk-l" class="w-full bg-gray-800 border border-gray-600 rounded p-1 text-white"></div>
                        </div>
                    </div>
                    <div>
                        <h4 class="text-sm font-bold text-gray-400 mb-2 uppercase tracking-wide">Telegram TI (Independiente)</h4>
                        <label class="block text-xs text-gray-500 mb-1">Bot Token</label>
                        <input type="password" id="zole-tg-token" class="w-full bg-gray-800 border border-gray-600 rounded p-1 mb-2 text-white">
                        <label class="block text-xs text-gray-500 mb-1">Chat ID</label>
                        <input type="text" id="zole-tg-chat" class="w-full bg-gray-800 border border-gray-600 rounded p-1 mb-2 text-white">
                        <label class="flex items-center space-x-2 cursor-pointer mt-2">
                            <input type="checkbox" id="zole-tg-activo" class="w-4 h-4 accent-indigo-500">
                            <span class="text-gray-300 text-sm">Activar Notificaciones de Hardware</span>
                        </label>
                    </div>
                </div>

                <div class="mt-6 grid grid-cols-3 gap-4 text-center border-t border-gray-700 pt-4">
                    <div class="bg-gray-800 p-3 rounded border border-gray-700">
                        <p class="text-xs text-gray-400 uppercase tracking-widest">CPU (Linux)</p>
                        <p id="live-cpu" class="text-2xl font-black text-white">--%</p>
                    </div>
                    <div class="bg-gray-800 p-3 rounded border border-gray-700">
                        <p class="text-xs text-gray-400 uppercase tracking-widest">RAM (Linux)</p>
                        <p id="live-ram" class="text-2xl font-black text-white">--%</p>
                    </div>
                    <div class="bg-gray-800 p-3 rounded border border-gray-700">
                        <p class="text-xs text-gray-400 uppercase tracking-widest">DISCO (Linux)</p>
                        <p id="live-disk" class="text-2xl font-black text-white">--%</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let token = "";

        async function cargarConfiguracion() {
            try {
                // 1. Cargar config del Core
                const res = await fetch('/api/godmode/config', { headers: { 'X-GodMode-Token': token } });
                if (res.status === 403) { alert("Token inválido."); return; }
                const config = await res.json();
                
                document.getElementById('plc-ip').value = config.plc.ip;
                document.getElementById('plc-rack').value = config.plc.rack;
                document.getElementById('plc-slot').value = config.plc.slot;
                document.getElementById('plc-simulacion').checked = config.plc.simulacion;
                
                document.getElementById('db-principal').value = config.database.retencion_principal_dias;
                document.getElementById('db-archivo').value = config.database.retencion_archivo_dias;
                document.getElementById('sys-polling').value = config.sistema.polling_ms;

                // 2. Cargar config del Agente ZoLe (IP + Límites + Telegram)
                const resZole = await fetch('/api/godmode/update_agent', { headers: { 'X-GodMode-Token': token } });
                const configZole = await resZole.json();
                
                document.getElementById('zole-ip').value = configZole.ip || '127.0.0.1';
                if(configZole.telegram) {
                    document.getElementById('zole-tg-token').value = configZole.telegram.token || '';
                    document.getElementById('zole-tg-chat').value = configZole.telegram.chat_id || '';
                    document.getElementById('zole-tg-activo').checked = configZole.telegram.activo == 1;
                }

                // Cargar límites actuales consultando la telemetría
                const resTel = await fetch('/api/telemetria');
                const tData = await resTel.json();
                const sensores = tData.sensores || [];
                const c = sensores.find(s=>s.n==='Linux_CPU_Usage');
                const r = sensores.find(s=>s.n==='Linux_RAM_Usage');
                const d = sensores.find(s=>s.n==='Linux_Disk_Usage');
                if(c) { document.getElementById('zole-cpu-h').value = c.lh; document.getElementById('zole-cpu-l').value = c.ll; }
                if(r) { document.getElementById('zole-ram-h').value = r.lh; document.getElementById('zole-ram-l').value = r.ll; }
                if(d) { document.getElementById('zole-disk-h').value = d.lh; document.getElementById('zole-disk-l').value = d.ll; }

                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
            } catch (e) { alert("Error de conexión con el Core."); }
        }

        async function autenticar() {
            token = document.getElementById('token-input').value;
            await cargarConfiguracion();
        }

        async function guardarConfig() {
            const nuevaConfig = {
                plc: {
                    ip: document.getElementById('plc-ip').value,
                    rack: parseInt(document.getElementById('plc-rack').value),
                    slot: parseInt(document.getElementById('plc-slot').value),
                    simulacion: document.getElementById('plc-simulacion').checked
                },
                database: {
                    retencion_principal_dias: parseInt(document.getElementById('db-principal').value),
                    retencion_archivo_dias: parseInt(document.getElementById('db-archivo').value)
                },
                sistema: {
                    polling_ms: parseInt(document.getElementById('sys-polling').value),
                    log_level: "INFO"
                },
                licencia: { cliente: "Planta", expiracion: "2026-12-31", mac_autorizada: "ANY" } // Mantenemos defaults por ahora
            };

            try {
                const res = await fetch('/api/godmode/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-GodMode-Token': token },
                    body: JSON.stringify(nuevaConfig)
                });

                if (res.ok) {
                    // Mensaje actualizado confirmando el Hot Reload
                    alert("¡Configuración guardada! La conexión al PLC se ha actualizado en tiempo real sin necesidad de reiniciar.");
                } else {
                    const errorData = await res.json();
                    alert("Error al guardar la configuración: " + (errorData.message || "Fallo en el servidor"));
                }
            } catch (err) {
                alert("Error crítico de red al intentar comunicarse con el servidor.");
            }
        }

        async function guardarAgenteZoLe() {
            const ip = document.getElementById('zole-ip').value;
            const puerto = parseInt(document.getElementById('zole-port').value) || 161;
            
            const limites = {
                cpu_h: document.getElementById('zole-cpu-h').value,
                cpu_l: document.getElementById('zole-cpu-l').value,
                ram_h: document.getElementById('zole-ram-h').value,
                ram_l: document.getElementById('zole-ram-l').value,
                disk_h: document.getElementById('zole-disk-h').value,
                disk_l: document.getElementById('zole-disk-l').value
            };

            const telegram = {
                token: document.getElementById('zole-tg-token').value,
                chat_id: document.getElementById('zole-tg-chat').value,
                activo: document.getElementById('zole-tg-activo').checked ? 1 : 0
            };

            if (!ip) return alert("Por favor ingresa la IP del Linux VM");

            try {
                const res = await fetch('/api/godmode/update_agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-GodMode-Token': token },
                    body: JSON.stringify({ ip, puerto, limites, telegram })
                });
                if (res.ok) alert("✅ Configuración TI (Hardware & Telegram) guardada con éxito.");
                else alert("Fallo al guardar la configuración.");
            } catch (e) { alert("Error de red."); }
        }

        // Live polling para monitorear el agente ZoLe desde el admin
        setInterval(async () => {
            if (document.getElementById('admin-panel').classList.contains('hidden')) return;
            try {
                const res = await fetch('/api/telemetria');
                const data = await res.json();
                const sensores = data.sensores || [];
                
                const cpu = sensores.find(s => s.n === 'Linux_CPU_Usage');
                const ram = sensores.find(s => s.n === 'Linux_RAM_Usage');
                const disk = sensores.find(s => s.n === 'Linux_Disk_Usage');

                if (cpu) document.getElementById('live-cpu').innerText = parseFloat(cpu.val).toFixed(1) + '%';
                if (ram) document.getElementById('live-ram').innerText = parseFloat(ram.val).toFixed(1) + '%';
                if (disk) document.getElementById('live-disk').innerText = parseFloat(disk.val).toFixed(1) + '%';
            } catch(e) {}
        }, 1500);
    </script>
</body>
</html>
